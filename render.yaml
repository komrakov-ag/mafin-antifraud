services:
  - type: web
    name: mafin-antifraud
    env: go
    buildCommand: go build -o mafin
    startCommand: ./mafin
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: PRODUCTION
      - key: GO_ENV
        value: production
    plan: free
    healthCheckPath: /health
    autoDeploy: true